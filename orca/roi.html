<style>
  :root{--field:#111927;--navy:#22334A;--amber:#F2B23E;--cream:#F7F3EA;--dim:#98A1B0}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--field);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Space Grotesk","Avenir Next",Helvetica,Arial,sans-serif;line-height:1.6}
  .gate{max-width:420px;width:100%;padding:32px 24px;text-align:center}
  .logos{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:30px}
  .logos .cxm{width:48px;height:48px;border-radius:11px}
  .logos .chip{background:var(--cream);border-radius:10px;padding:8px 12px;display:flex;align-items:center}
  .logos .chip img{height:36px;display:block}
  .logos .x{font-family:"IBM Plex Mono",Menlo,monospace;font-size:14px;color:var(--dim)}
  .kick{font-family:"IBM Plex Mono",Menlo,monospace;font-size:11.5px;font-weight:600;letter-spacing:.3em;
    color:var(--amber);text-transform:uppercase;margin-bottom:12px}
  h1{font-size:24px;font-weight:700;margin-bottom:6px}
  .sub{font-family:"IBM Plex Mono",Menlo,monospace;font-size:12.5px;color:var(--dim);margin-bottom:28px}
  input{width:100%;background:rgba(34,51,74,.6);border:1px solid rgba(247,243,234,.25);border-radius:10px;
    color:var(--cream);font-family:"IBM Plex Mono",Menlo,monospace;font-size:16px;padding:13px 16px;text-align:center;letter-spacing:.08em}
  input:focus{outline:none;border-color:var(--amber)}
  button{width:100%;margin-top:12px;background:var(--amber);color:var(--navy);border:none;border-radius:10px;
    font-family:"IBM Plex Mono",Menlo,monospace;font-size:14px;font-weight:600;letter-spacing:.14em;padding:13px 0;cursor:pointer}
  button:disabled{opacity:.6;cursor:wait}
  .err{font-family:"IBM Plex Mono",Menlo,monospace;font-size:12.5px;color:#e86a5a;margin-top:12px;min-height:18px}
  .foot{font-family:"IBM Plex Mono",Menlo,monospace;font-size:11.5px;color:var(--dim);margin-top:30px}
</style>

const ITER=310000;
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const u=b64(PAYLOAD), SALT=u.slice(0,16), IV=u.slice(16,28), CT=u.slice(28);
async function derive(pw){
  const m=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:SALT,iterations:ITER,hash:'SHA-256'},m,{name:'AES-GCM',length:256},true,['decrypt']);
}
async function open(k){
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:IV},k,CT);
  sessionStorage.setItem('orca_k', btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey('raw',k)))));
  const doc=new DOMParser().parseFromString(new TextDecoder().decode(pt),'text/html');
  // collect scripts in order, then swap the DOM (parsed scripts are inert) and re-execute them
  const specs=[...doc.querySelectorAll('script')].map(s=>({src:s.src,text:s.textContent}));
  doc.querySelectorAll('script').forEach(s=>s.remove());
  document.replaceChild(document.adoptNode(doc.documentElement), document.documentElement);
  for(const sp of specs){
    await new Promise((res,rej)=>{
      const el=document.createElement('script');
      if(sp.src){ el.src=sp.src; el.onload=res; el.onerror=res; }
      else { el.textContent=sp.text; }
      document.body.appendChild(el);
      if(!sp.src) res();
    });
  }
}
window.addEventListener('DOMContentLoaded', async()=>{ // auto-unlock if key already in session (after parse, so document.write replaces)
  const raw=sessionStorage.getItem('orca_k');
  if(raw){ try{ await open(await crypto.subtle.importKey('raw',b64(raw),'AES-GCM',true,['decrypt'])); }catch(e){ sessionStorage.removeItem('orca_k'); } }
});
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const btn=document.getElementById('go'),err=document.getElementById('err');
  btn.disabled=true;err.textContent='';
  try{ await open(await derive(document.getElementById('pw').value.trim())); }
  catch(ex){ err.textContent='That password did not open it. Check for typos and try again.'; btn.disabled=false; }
});
</script>
